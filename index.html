export default function MinimalistLoginLandingPage() {
  const htmlCode = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --panel: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.5);
      --input-bg: rgba(255,255,255,0.03);
      --input-focus: rgba(255,255,255,0.06);
      --button-bg: #ffffff;
      --button-text: #000000;
      --message-bg: rgba(255,255,255,0.05);
      --message-border: rgba(255,255,255,0.1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px 28px 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    form {
      display: grid;
      gap: 14px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 16px;
      padding: 16px;
      font-size: 0.95rem;
      outline: none;
      transition: all 160ms ease;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      background: var(--input-focus);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.08);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 16px;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover { opacity: 0.95; }
    button:active { transform: scale(0.99); }

    .message {
      min-height: 20px;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      opacity: 0;
      transition: opacity 160ms ease, background 160ms ease;
    }

    .message.show {
      opacity: 1;
      background: var(--message-bg);
      border-color: var(--message-border);
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 22px;
        padding: 28px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <form id="loginForm" novalidate>
        <label class="sr-only" for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />

        <button type="submit">Submit</button>
      </form>

      <div id="message" class="message"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const message = document.getElementById('message');

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const attemptedPassword = passwordInput.value.trim();

      if (!attemptedPassword) {
        message.textContent = 'Enter a password.';
        message.classList.add('show');
        passwordInput.focus();
        return;
      }

      message.textContent = 'Access denied.';
      message.classList.add('show');
      passwordInput.value = '';
      passwordInput.focus();
    });
  <\/script>
</body>
</html>`;

  const previewHtml = htmlCode.replace(
    '<title>Login</title>',
    '<title>Login</title><base target="_self" />'
  );

  return (
    <div className="min-h-screen bg-black text-white p-6 md:p-10">
      <div className="mx-auto max-w-6xl grid gap-6 lg:grid-cols-2">
        <section className="rounded-3xl border border-white/10 bg-white/[0.03] shadow-2xl shadow-black/40 overflow-hidden min-h-[640px]">
          <iframe
            title="Login preview"
            srcDoc={previewHtml}
            className="h-[640px] w-full border-0 bg-black"
          />
        </section>

        <section className="rounded-3xl border border-white/10 bg-white/[0.03] shadow-2xl shadow-black/40 p-6 md:p-8">
          <div className="mb-4">
            <h1 className="text-3xl font-semibold tracking-tight text-white">index.html</h1>
            <p className="mt-2 text-sm text-white/60">
              Copy into a file named index.html for GitHub Pages.
            </p>
          </div>

          <pre className="overflow-auto rounded-2xl border border-white/10 bg-black/40 p-4 text-xs text-white whitespace-pre-wrap break-words">
            <code>{htmlCode}</code>
          </pre>

          <div className="mt-4 rounded-2xl border border-white/10 bg-black/30 p-4 text-sm text-white/70">
            <p className="font-medium text-white">Manual test cases</p>
            <ol className="mt-2 list-decimal pl-5 space-y-1">
              <li>Load page → centered card appears.</li>
              <li>Submit empty → “Enter a password.”</li>
              <li>Submit any input → “Access denied.”</li>
              <li>Input clears and refocuses.</li>
              <li>No page reload on submit.</li>
            </ol>
          </div>
        </section>
      </div>
    </div>
  );
}
