<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashleigh Ekari</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --bg-2: #ece7df;
      --ink: #171717;
      --muted: rgba(23, 23, 23, 0.5);
      --line: rgba(23, 23, 23, 0.1);
      --card: rgba(255, 255, 255, 0.38);
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      --radius: 28px;
      --mouse-x: 50%;
      --mouse-y: 50%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.95), transparent 22%),
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.8), transparent 20%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,0.45), transparent 24%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      color: var(--ink);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 42vw;
      height: 42vw;
      border-radius: 50%;
      filter: blur(50px);
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    body::before {
      top: -10vw;
      right: -8vw;
      background: rgba(255,255,255,0.6);
    }

    body::after {
      bottom: -14vw;
      left: -10vw;
      background: rgba(255,255,255,0.35);
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 85%);
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      position: relative;
      width: min(880px, 100%);
      aspect-ratio: 1.5 / 1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow: hidden;
      isolation: isolate;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 15%, rgba(255,255,255,0.8), transparent 20%),
        radial-gradient(circle at 85% 80%, rgba(255,255,255,0.3), transparent 22%);
      z-index: -2;
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(23, 23, 23, 0.07);
      border-radius: calc(var(--radius) - 10px);
      pointer-events: none;
      z-index: -1;
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(23,23,23,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23,23,23,0.05) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      opacity: 0.6;
      pointer-events: none;
    }

    .title {
      position: absolute;
      top: 28px;
      left: 34px;
      margin: 0;
      font-size: clamp(1rem, 1.2vw, 1.05rem);
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .centerpiece {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 80px 24px;
    }

    .glyph-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 2vw, 24px);
      padding: clamp(20px, 2.4vw, 30px) clamp(28px, 4vw, 46px);
      border: 1px solid rgba(23,23,23,0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.42);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 240ms ease, box-shadow 240ms ease, background 240ms ease, border-color 240ms ease;
      user-select: none;
      overflow: hidden;
      z-index: 2;
    }

    .glyph-button:hover,
    .glyph-button:focus-visible {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 18px 42px rgba(0,0,0,0.09);
      background: rgba(255,255,255,0.56);
      border-color: rgba(23,23,23,0.2);
      outline: none;
    }

    .glyph-button:active {
      transform: scale(0.99);
    }

    .glyph-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.75), transparent 30%);
      opacity: 0;
      transition: opacity 240ms ease;
      pointer-events: none;
    }

    .glyph-button:hover::before,
    .glyph-button:focus-visible::before {
      opacity: 1;
    }

    .glyph {
      position: relative;
      font-size: clamp(2.2rem, 6vw, 4.6rem);
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--ink);
      transition: transform 320ms ease, opacity 320ms ease, filter 320ms ease;
    }

    .glyph-button:hover .glyph,
    .glyph-button:focus-visible .glyph {
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.08));
    }

    .glyph-button:hover .glyph:first-child,
    .glyph-button:focus-visible .glyph:first-child {
      transform: translateX(-2px) rotate(-3deg) scale(1.03);
    }

    .glyph-button:hover .glyph:last-child,
    .glyph-button:focus-visible .glyph:last-child {
      transform: translateX(2px) rotate(3deg) scale(1.03);
    }

    .divider {
      width: 1px;
      height: clamp(36px, 5vw, 60px);
      background: linear-gradient(to bottom, transparent, rgba(23,23,23,0.25), transparent);
      transition: transform 260ms ease, opacity 260ms ease;
    }

    .glyph-button:hover .divider,
    .glyph-button:focus-visible .divider {
      transform: scaleY(1.15);
      opacity: 0.9;
    }

    .orbit {
      position: absolute;
      width: min(48vw, 520px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(23,23,23,0.08);
      opacity: 0.7;
      animation: slow-spin 22s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    .orbit::before,
    .orbit::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(23,23,23,0.06);
      inset: 12%;
    }

    .orbit::after {
      inset: 28%;
    }

    .marker {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      margin: -5px;
      border-radius: 50%;
      background: rgba(23,23,23,0.7);
      box-shadow: 0 0 0 8px rgba(23,23,23,0.04);
      transform: rotate(var(--angle)) translateX(calc(min(24vw, 260px))) rotate(calc(var(--angle) * -1));
      animation: pulse 3s ease-in-out infinite;
    }

    .hint {
      position: absolute;
      right: 28px;
      bottom: 22px;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.8;
    }

    .corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: rgba(23,23,23,0.18);
      border-style: solid;
      pointer-events: none;
    }

    .corner.tl { top: 18px; left: 18px; border-width: 1px 0 0 1px; border-top-left-radius: 12px; }
    .corner.tr { top: 18px; right: 18px; border-width: 1px 1px 0 0; border-top-right-radius: 12px; }
    .corner.bl { bottom: 18px; left: 18px; border-width: 0 0 1px 1px; border-bottom-left-radius: 12px; }
    .corner.br { bottom: 18px; right: 18px; border-width: 0 1px 1px 0; border-bottom-right-radius: 12px; }

    @keyframes slow-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: rotate(var(--angle)) translateX(calc(min(24vw, 260px))) scale(1) rotate(calc(var(--angle) * -1)); }
      50% { transform: rotate(var(--angle)) translateX(calc(min(24vw, 260px))) scale(1.35) rotate(calc(var(--angle) * -1)); }
    }

    @media (max-width: 700px) {
      .panel {
        aspect-ratio: 1 / 1.2;
      }

      .title {
        top: 22px;
        left: 24px;
      }

      .hint {
        right: 22px;
        bottom: 18px;
        font-size: 0.64rem;
      }

      .orbit {
        width: 78vw;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <main class="wrap">
    <section class="panel" id="panel">
      <div class="grid-lines" aria-hidden="true"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <h1 class="title">ashleighekari.com</h1>

      <div class="centerpiece">
        <div class="orbit" aria-hidden="true">
          <span class="marker" style="--angle: 18deg"></span>
          <span class="marker" style="--angle: 198deg"></span>
        </div>

        <button class="glyph-button" id="glyphButton" aria-label="Compass and Jupiter symbol">
          <span class="glyph">🧭</span>
          <span class="divider" aria-hidden="true"></span>
          <span class="glyph">♃</span>
        </button>
      </div>

      <div class="hint">true north</div>
    </section>
  </main>

  <script>
    const root = document.documentElement;
    const panel = document.getElementById('panel');
    const glyphButton = document.getElementById('glyphButton');

    function setMouseVars(x, y, target) {
      const rect = target.getBoundingClientRect();
      const px = ((x - rect.left) / rect.width) * 100;
      const py = ((y - rect.top) / rect.height) * 100;
      root.style.setProperty('--mouse-x', `${Math.max(0, Math.min(100, px))}%`);
      root.style.setProperty('--mouse-y', `${Math.max(0, Math.min(100, py))}%`);
    }

    panel.addEventListener('pointermove', (event) => {
      setMouseVars(event.clientX, event.clientY, panel);
    });

    panel.addEventListener('mouseleave', () => {
      root.style.setProperty('--mouse-x', '50%');
      root.style.setProperty('--mouse-y', '50%');
    });

    glyphButton.addEventListener('pointermove', (event) => {
      setMouseVars(event.clientX, event.clientY, glyphButton);
    });

    glyphButton.addEventListener('click', () => {
      panel.animate(
        [
          { transform: 'scale(1)' },
          { transform: 'scale(0.995)' },
          { transform: 'scale(1)' }
        ],
        {
          duration: 320,
          easing: 'cubic-bezier(.2,.8,.2,1)'
        }
      );

      glyphButton.animate(
        [
          { transform: 'translateY(0) scale(1)' },
          { transform: 'translateY(-3px) scale(1.02)' },
          { transform: 'translateY(0) scale(1)' }
        ],
        {
          duration: 420,
          easing: 'cubic-bezier(.2,.8,.2,1)'
        }
      );
    });
  </script>
</body>
</html>
