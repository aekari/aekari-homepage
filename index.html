export default function MinimalistLoginLandingPage() {

  <style>
    :root {
      --bg: #dfe3f3;
      --text: #1e2230;
      --muted: rgba(30, 34, 48, 0.44);
      --glass-fill: rgba(255, 255, 255, 0.30);
      --glass-fill-strong: rgba(255, 255, 255, 0.42);
      --glass-border: rgba(255, 255, 255, 0.48);
      --glass-stroke: rgba(255, 255, 255, 0.62);
      --input-fill: rgba(255, 255, 255, 0.36);
      --button-text: #1c2030;
      --button-fill: rgba(255, 255, 255, 0.34);
      --message-fill: rgba(255, 255, 255, 0.26);
      --message-border: rgba(255, 255, 255, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.55;
    }

    body::before {
      width: 320px;
      height: 320px;
      top: -80px;
      right: -40px;
      background: rgba(255, 255, 255, 0.30);
    }

    body::after {
      width: 260px;
      height: 260px;
      left: -70px;
      bottom: -70px;

    .shell {
      width: 100%;
      max-width: 438px;
      position: relative;
      z-index: 1;
    }

    .card {
      position: relative;
      border-radius: 24px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.22) 100%);

      backdrop-filter: blur(22px) saturate(135%);

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        0 8px 24px rgba(112, 124, 165, 0.10);
    }

    .panel {
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.22) 100%);
      border: 1px solid rgba(255,255,255,0.44);
      backdrop-filter: blur(18px) saturate(130%);
      -webkit-backdrop-filter: blur(18px) saturate(130%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    form {
      display: grid;
      gap: 12px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    input {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.40);

      font-size: 0.95rem;
      font-weight: 500;
      outline: none;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.34);
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    input::placeholder {
      color: rgba(30, 34, 48, 0.50);
    }

    input:focus {
      border-color: rgba(255,255,255,0.60);
      background: linear-gradient(180deg, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.28) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.42),
        0 0 0 3px rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      height: 54px;
      border: 1px solid rgba(255,255,255,0.42);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0.30) 100%);
      color: var(--button-text);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.40);
      transition: transform 120ms ease, background 160ms ease, border-color 160ms ease;
    }

    button:hover {
      background: linear-gradient(180deg, rgba(255,255,255,0.48) 0%, rgba(255,255,255,0.34) 100%);
      border-color: rgba(255,255,255,0.56);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      min-height: 18px;
      margin-top: 10px;
      padding: 0;
      font-size: 0.84rem;
      font-family: inherit;
      font-weight: 500;
      color: rgba(30, 34, 48, 0.68);
      background: transparent;
      border: none;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .message.show {
      opacity: 1;
    }

    @media (max-width: 480px) {
      body {
        padding: 64px 18px 18px;
      }

      .card {
        border-radius: 22px;
        padding: 12px;
      }

      .panel {
        border-radius: 16px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="panel">
        <form id="loginForm" novalidate>
          <label class="sr-only" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
          <button type="submit">Submit</button>
        </form>
        <div id="message" class="message" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const message = document.getElementById('message');

    if (form && passwordInput && message) {
      form.addEventListener('submit', function (event) {
        event.preventDefault();

        const attemptedPassword = passwordInput.value.trim();

        if (!attemptedPassword) {
          message.textContent = 'Enter a password.';
          message.classList.add('show');
          passwordInput.focus();
          return;
        }

        message.textContent = 'Access denied.';
        message.classList.add('show');
        passwordInput.value = '';
        passwordInput.focus();
      });
    }
  <\/script>
</body>
</html>`;

  const previewHtml = htmlCode.replace(
    '<title>Login</title>',
    '<title>Login</title><base target="_self" />'
  );

  return (
    <div className="min-h-screen p-6 md:p-10" style={{ background: '#dfe3f3', color: '#1e2230' }}>
      <div className="mx-auto max-w-6xl grid gap-6 lg:grid-cols-2">
        <section className="overflow-hidden rounded-3xl border border-white/40 min-h-[640px]" style={{ background: 'rgba(255,255,255,0.22)', boxShadow: '0 8px 24px rgba(112,124,165,0.08)' }}>
          <iframe
            title="Login preview"
            srcDoc={previewHtml}
            className="h-[640px] w-full border-0"
            style={{ background: '#dfe3f3' }}
            sandbox="allow-scripts allow-forms"
          />
        </section>

        <section className="rounded-3xl p-6 md:p-8" style={{ background: 'rgba(255,255,255,0.24)', border: '1px solid rgba(255,255,255,0.42)', boxShadow: '0 8px 24px rgba(112,124,165,0.08)' }}>
          <div className="mb-4">
            <h1 className="text-3xl font-semibold tracking-tight" style={{ color: '#1e2230' }}>index.html</h1>
            <p className="mt-2 text-sm" style={{ color: 'rgba(30,34,48,0.62)' }}>
              Copy this into a file named index.html for GitHub Pages.
            </p>
          </div>

          <pre className="overflow-auto rounded-2xl p-4 text-xs whitespace-pre-wrap break-words" style={{ background: 'rgba(255,255,255,0.22)', border: '1px solid rgba(255,255,255,0.42)', color: '#1e2230' }}>
            <code>{htmlCode}</code>
          </pre>

          <div className="mt-4 rounded-2xl p-4 text-sm" style={{ background: 'rgba(255,255,255,0.22)', border: '1px solid rgba(255,255,255,0.42)', color: 'rgba(30,34,48,0.72)' }}>
            <p className="font-medium" style={{ color: '#1e2230' }}>Manual test cases</p>
            <ol className="mt-2 list-decimal pl-5 space-y-1">
              <li>Load page → pale blue-gray background appears.</li>
              <li>Login card uses clear glassmorphism without a muddy dark shadow behind it.</li>
              <li>Card sits higher on the page and feels closer to the reference image.</li>
              <li>Submit empty field → “Enter a password.”</li>
              <li>Submit any typed value → “Access denied.”</li>
              <li>After denied submit → field clears, focus returns, and the page does not reload.</li>
            </ol>
          </div>
        </section>
      </div>
    </div>
  );
}
